<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería | DC Cocktail Experience</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:url("images/galeriafondo.jpg") center/cover fixed no-repeat;
color:white;
text-align:center;
padding:40px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:-1;
}

/* BOTON REGRESO */

.back{
position:absolute;
left:40px;
top:40px;
text-decoration:none;
color:white;
font-size:20px;
transition:0.3s;
}

.back:hover{
color:#ffd349;
}

/* TITULO */

h1{
font-size:55px;
margin-top:60px;
}

.subtitle{
margin-top:10px;
margin-bottom:60px;
font-size:22px;
color:#ccc;
}

/* GRID GALERIA */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:85%;
max-height:85%;
border-radius:10px;
transition:opacity 0.3s ease;
}

/* BOTONES NAVEGACION */

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:50px;
color:white;
cursor:pointer;
padding:20px;
transition:0.3s;
user-select:none;
}

.nav-btn:hover{
color:#ffd349;
}

.prev{
left:40px;
}

.next{
right:40px;
}

.close{
position:absolute;
top:40px;
right:50px;
font-size:40px;
cursor:pointer;
}

/* RESPONSIVE */

@media(max-width:1000px){
.gallery{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:600px){
.gallery{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="overlay"></div>

<a href="index.html" class="back">← Inicio</a>

<h1>Nuestra Experiencia</h1>

<p class="subtitle">Eventos, cócteles y momentos inolvidables</p>

<div class="gallery">

<img src="images/img1.JPG" onclick="openLightbox(0)">
<img src="images/img2.jpeg" onclick="openLightbox(1)">
<img src="images/img3.jpeg" onclick="openLightbox(2)">
<img src="images/img4.jpeg" onclick="openLightbox(3)">
<img src="images/img5.jpeg" onclick="openLightbox(4)">
<img src="images/img6.jpeg" onclick="openLightbox(5)">
<img src="images/img7.jpeg" onclick="openLightbox(6)">
<img src="images/img8.jpeg" onclick="openLightbox(7)">
<img src="images/img9.jpeg" onclick="openLightbox(8)">
<img src="images/img10.JPG" onclick="openLightbox(9)">
<img src="images/img11.JPG" onclick="openLightbox(10)">
<img src="images/img12.JPG" onclick="openLightbox(11)">
<img src="images/img13.JPG" onclick="openLightbox(12)">
<img src="images/img14.JPG" onclick="openLightbox(13)">
<img src="images/img15.JPG" onclick="openLightbox(14)">

</div>

<div class="lightbox" id="lightbox">

<span class="close" onclick="closeLightbox()">✕</span>

<span class="nav-btn prev" onclick="changeImage(-1)">❮</span>
<img id="lightbox-img">
<span class="nav-btn next" onclick="changeImage(1)">❯</span>

</div>

<script>

const images = [
"images/img1.JPG",
"images/img2.jpeg",
"images/img3.jpeg",
"images/img4.jpeg",
"images/img5.jpeg",
"images/img6.jpeg",
"images/img7.jpeg",
"images/img8.jpeg",
"images/img9.jpeg",
"images/img10.JPG",
"images/img11.JPG",
"images/img12.JPG",
"images/img13.JPG",
"images/img14.JPG",
"images/img15.JPG"
];

let currentIndex = 0;
let startX = 0;

function openLightbox(index){
currentIndex = index;
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

function changeImage(direction){
currentIndex += direction;

if(currentIndex < 0){
currentIndex = images.length - 1;
}

if(currentIndex >= images.length){
currentIndex = 0;
}

document.getElementById("lightbox-img").style.opacity = 0;

setTimeout(()=>{
document.getElementById("lightbox-img").src = images[currentIndex];
document.getElementById("lightbox-img").style.opacity = 1;
},200);
}

/* TECLADO */

document.addEventListener("keydown",function(e){
if(document.getElementById("lightbox").style.display === "flex"){
if(e.key === "ArrowRight") changeImage(1);
if(e.key === "ArrowLeft") changeImage(-1);
if(e.key === "Escape") closeLightbox();
}
});

/* SWIPE MOVIL */

const lightbox = document.getElementById("lightbox");

lightbox.addEventListener("touchstart",e=>{
startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let endX = e.changedTouches[0].clientX;
if(startX - endX > 50) changeImage(1);
if(endX - startX > 50) changeImage(-1);
});

</script>

</body>
</html>
